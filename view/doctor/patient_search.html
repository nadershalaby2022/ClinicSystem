<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحث المرضى - ClinicSystem</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doctor.css') }}">
</head>
<body>
    <header class="topbar doctor-topbar">
        <div class="brand"><span class="brand-dot doctor-dot"></span>بحث قاعدة المرضى</div>
        <nav>
            <a href="/doctor">لوحة الطبيب</a>
            <a href="/dashboard">الرئيسية</a>
            <a href="/logout">خروج</a>
        </nav>
    </header>

    <main class="patient-page">
        <section class="patient-header panel">
            <div>
                <span class="eyebrow">Patient Database</span>
                <h1>البحث في ملفات المرضى</h1>
                <div class="patient-meta">
                    <span>بحث بالاسم</span>
                    <span>بحث برقم الهاتف</span>
                    <span>بحث بالرقم المرجعي</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="search-bar">
                <input id="patient-search-input" placeholder="اكتب اسم المريض أو رقم الهاتف أو الرقم المرجعي مثل CL-000001">
                <button class="btn primary" id="patient-search-button">بحث</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>الرقم المرجعي</th>
                            <th>اسم المريض</th>
                            <th>الهاتف</th>
                            <th>العمر</th>
                            <th>عدد الزيارات</th>
                            <th>آخر زيارة</th>
                            <th>آخر تشخيص</th>
                            <th>فتح</th>
                        </tr>
                    </thead>
                    <tbody id="patient-search-results"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/doctor.js') }}"></script>
</body>
</html>
