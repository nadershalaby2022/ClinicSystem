<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الاستقبال - ClinicSystem</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reception.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand"><span class="brand-dot reception-dot"></span>لوحة الاستقبال</div>
        <nav>
            <a href="/dashboard">الرئيسية</a>
            <a href="/tv" target="_blank">شاشة العرض</a>
            {% if current_user.role == 'admin' %}<a href="/admin/users">المستخدمون</a>{% endif %}
            <a href="/logout">خروج</a>
        </nav>
    </header>

    <main class="workspace reception-workspace">
        <section class="panel booking-panel">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Reception Desk</span>
                    <h1>حجز جديد</h1>
                </div>
                <button class="btn ghost" id="reset-booking">حجز جديد</button>
            </div>
            <form id="appointment-form" class="form-grid">
                <input type="hidden" id="appointment-id">
                <label>اسم المريض
                    <input id="patient-name" required>
                </label>
                <label>رقم الهاتف
                    <input id="patient-phone" required>
                </label>
                <label>العمر
                    <input id="patient-age" type="number" min="0">
                </label>
                <label>النوع
                    <select id="patient-gender">
                        <option value="">غير محدد</option>
                        <option>ذكر</option>
                        <option>أنثى</option>
                    </select>
                </label>
                <label>نوع الحجز
                    <select id="appointment-type" required>
                        <option>كشف</option>
                        <option>استشارة</option>
                    </select>
                </label>
                <label>وقت الحجز
                    <input id="appointment-time" type="datetime-local">
                </label>
                <label class="span-2">العنوان
                    <input id="patient-address">
                </label>
                <label class="span-2">ملاحظات الحجز
                    <textarea id="appointment-notes" rows="3"></textarea>
                </label>
                <button class="btn primary span-2" type="submit">حفظ الحجز وإصدار رقم</button>
            </form>
        </section>

        <section class="panel queue-panel">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Live Queue</span>
                    <h1>حركة الانتظار</h1>
                </div>
                <div class="live-pill" id="reception-updated">--:--</div>
            </div>
            <div class="current-strip">
                <span>داخل الكشف الآن</span>
                <strong id="current-ticket">-</strong>
                <b id="current-name">لا يوجد حالياً</b>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>الدور</th>
                            <th>المريض</th>
                            <th>النوع</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="queue-table"></tbody>
                </table>
            </div>
        </section>

        <section class="panel full-panel">
            <div class="panel-title">
                <div>
                    <span class="eyebrow">Today</span>
                    <h1>حجوزات اليوم</h1>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>رقم</th>
                            <th>المريض</th>
                            <th>الهاتف</th>
                            <th>الوقت</th>
                            <th>النوع</th>
                            <th>الحالة</th>
                            <th>إدارة</th>
                        </tr>
                    </thead>
                    <tbody id="appointments-table"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
